spring:
  application:
    name: aiagent
  ai:
    mcp:
      client:
        stdio:
          servers-configuration: classpath:mcp-servers.json
    openai:
      api-key: xxxxxxxx
      base-url: xxxxxxxx
      chat:
        options:
          model: gpt-4o
server:
  port: 8123
  servlet:
    context-path: /api
# springdoc-openapi
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.example.aiagent.controller
search-api:
  api-key: xxxxxxxx
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn
